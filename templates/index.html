{% extends "base.html" %} {% block content %}
<div class="grid grid-cols-2 gap-5">
  {% for post in posts %}
  <div class="border border-primary-border rounded-2xl px-5 py-3 shadow-sm space-y-5">

    <div class="flex items-center gap-3">
        <button aria-label="button" title="Profile" class="flex items-center 
        justify-center p-5 bg-white rounded-full cursor-pointer"></button>

       <div class="space-y-px">
        <h1>{{ post.author}}</h1>
        <p class="text-sm">{{ post.date_posted }}</p>
       </div>
    </div>

    <div class="flex flex-col gap-4">
        <a href="{{ url_for("get_post_page", post_id=post.id) }}" class="text-blue-600 font-semibold text-lg">{{ post.title }}</a>
        <p>{{ post.content }}</p>
    </div>

  </div>
  {% endfor %}
</div>
{% endblock content %}
